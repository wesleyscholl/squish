name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build & deploy MkDocs to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git-revision-date plugin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs + theme
        run: pip install mkdocs-material

      - name: Sync root docs into docs/ folder
        run: |
          cp CONTRIBUTING.md docs/contributing.md
          cp CHANGELOG.md    docs/changelog.md    2>/dev/null || true

      - name: Build & deploy
        run: mkdocs gh-deploy --force
